aid: lexisnexis
name: LexisNexis
description: LexisNexis is a global provider of legal, regulatory, and business information
  and analytics. Through the LexisNexis Developer Portal and LexisNexis Risk Solutions,
  partners can integrate access to legal research, fraud detection, identity verification,
  and risk assessment capabilities into their applications. Most LexisNexis APIs are
  partner-access only and require contractual agreements before credentials and OpenAPI
  specifications are released.
